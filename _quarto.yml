website:
  title: "Indicadores sintéticos"
  site-url: "https://demopop.github.io/indicadores-sinteticos/"
  description: "Tutorial em R para construir indicadores sintéticos (índices compostos) reconstruindo o IDHM nas 10 etapas do Handbook da OCDE: seleção de dados, normalização, ponderação, agregação, análise de robustez e validação. Workshop DEMOPOP 2026 — CEDEPLAR-UFMG."
  image: "tutorial_files/figure-html/mapa-idhm-1.png"
  reader-mode: true
  page-navigation: true
  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Início
      - href: tutorial.qmd
        text: Tutorial
      - href: slides.qmd
        text: Slides
    right:
      - text: "Idioma"
        icon: translate
        menu:
          - text: "Português"
            href: index.qmd
          - text: "English"
            href: en/index.qmd
          - text: "Español"
            href: es/index.qmd
      - icon: github
        href: https://github.com/DemoPOP/indicadores-sinteticos
        aria-label: GitHub
  page-footer:
    center: "Caio César Soares Gonçalves · Departamento de Demografia / CEDEPLAR-UFMG · DEMOPOP 2026 · CC BY 4.0"

lang: pt

